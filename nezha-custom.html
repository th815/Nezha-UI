<script>
    window.CustomLogo =
        "https://fastly.jsdelivr.net/gh/th815/images/blogstatuslogo.png";
    window.ShowNetTransfer = "true";
    window.CustomDesc =
        "后台就是花式curd工程师，前端就是抠图工程师，大数据就是sql工程师，算法就是调参工程师，中间件就是客服热线接线员， -只有运维才能拯救世界！";
    window.CustomIllustration =
        "https://fastly.jsdelivr.net/gh/th815/images/blog1734664224123.png";
    window.CustomMobileBackgroundImage =
        "https://fastly.jsdelivr.net/gh/th815/images/blog1734664417905.png";
    window.ForceTheme = "dark";

    var observer = new MutationObserver(function (mutationsList, observer) {
        var xpath = "/html/body/div/div/main/div[2]/section[1]/div[4]/div";
        var container = document.evaluate(
            xpath,
            document,
            null,
            XPathResult.FIRST_ORDERED_NODE_TYPE,
            null,
        ).singleNodeValue;

        if (container) {
            observer.disconnect();
            var existingImg = container.querySelector("img");
            if (existingImg) {
                container.removeChild(existingImg);
            }
            var imgElement = document.createElement("img");
            imgElement.src =
                "https://fastly.jsdelivr.net/gh/th815/images/blog1734664224123.png";
            imgElement.style.position = "absolute";
            imgElement.style.right = "0px";
            imgElement.style.top = "-60px";
            imgElement.style.zIndex = "10";
            imgElement.style.width = "90px";
            container.appendChild(imgElement);
        }
    });
    var config = { childList: true, subtree: true };
    observer.observe(document.body, config);
</script>
